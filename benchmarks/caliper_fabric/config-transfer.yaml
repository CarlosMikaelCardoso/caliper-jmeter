simpleArgs: &simple-args
  initialMoney: 1000000000
  moneyToTransfer: 10
  numberOfAccounts: &number-of-accounts 50

test:
  name: simple-transfer 
  description: Rodada de Transfer (Transferência de Contas) 
  workers:
    number: 5
  rounds:
    - label: transfer
      description: Teste de performance de transferência. 
      txNumber: *number-of-accounts
      rateControl:
        type: fixed-rate
        opts:
          tps: 50 
      workload:
        module: benchmarks/caliper_fabric/transfer.js
        arguments: *simple-args